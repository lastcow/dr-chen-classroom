site_name: Dr. Chen's Classroom
site_description: Course knowledge base — Frostburg State University
site_author: Dr. Chen
site_url: https://lastcow.github.io/dr-chen-classroom/

repo_name: lastcow/dr-chen-classroom
repo_url: https://github.com/lastcow/dr-chen-classroom

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Courses:
    - SCIA 120 - Intro to Secure Computing: entities/scia-120.md
    - SCIA 340 - Secure Databases: entities/scia-340.md
    - SCIA 360 - Operating System Security: entities/scia-360.md
    - SCIA 425 - Software Testing and Assurance: entities/scia-425.md
    - SCIA 472 - Hacking Exposed & Incident Response: entities/scia-472.md
    - ITEC 442 - Electronic Commerce: entities/itec-442.md
    - ITEC 445 - Database Systems II: entities/itec-445.md
  - Schema: SCHEMA.md
  - Log: log.md
