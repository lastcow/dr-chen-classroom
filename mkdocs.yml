site_name: Dr. Chen's Classroom
site_description: Course knowledge base — Frostburg State University
site_author: Dr. Chen
site_url: https://lastcow.github.io/dr-chen-classroom/

repo_name: lastcow/dr-chen-classroom
repo_url: https://github.com/lastcow/dr-chen-classroom

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

docs_dir: .
exclude_docs: |
  mkdocs.yml
  .github/
  raw/

nav:
  - Home: index.md
  - Schema: SCHEMA.md
  - Log: log.md
