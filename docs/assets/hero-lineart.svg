<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      .line { fill: none; stroke: rgba(200,169,81,0.22); stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .line-w { fill: none; stroke: rgba(255,255,255,0.10); stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
      .line-g { fill: none; stroke: rgba(61,158,69,0.18); stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: rgba(200,169,81,0.30); }
      .dot-w { fill: rgba(255,255,255,0.15); }
      .text-art { fill: rgba(200,169,81,0.12); font-family: monospace; font-size: 11px; }
    </style>
  </defs>

  <!-- ── CIRCUIT BOARD TRACES (left side) ── -->
  <!-- Horizontal trunk lines -->
  <polyline class="line" points="0,80 120,80 120,140 280,140"/>
  <polyline class="line" points="0,180 60,180 60,240 200,240 200,200 340,200"/>
  <polyline class="line" points="0,300 90,300 90,260 180,260 180,320 300,320"/>
  <polyline class="line" points="0,400 150,400 150,360 260,360 260,420 400,420"/>
  
  <!-- Vertical branch lines -->
  <polyline class="line" points="120,80 120,40 200,40 200,80"/>
  <polyline class="line" points="200,140 200,100 280,100"/>
  <polyline class="line" points="60,180 60,120 140,120 140,160"/>
  <polyline class="line" points="90,300 90,340 160,340 160,300 220,300"/>
  <polyline class="line" points="150,400 150,450 230,450 230,400 310,400 310,460"/>
  
  <!-- Small circuit pads -->
  <circle class="dot" cx="120" cy="80" r="4"/>
  <circle class="dot" cx="280" cy="140" r="4"/>
  <circle class="dot" cx="200" cy="240" r="4"/>
  <circle class="dot" cx="340" cy="200" r="4"/>
  <circle class="dot" cx="180" cy="320" r="4"/>
  <circle class="dot" cx="260" cy="420" r="4"/>
  <circle class="dot" cx="60" cy="180" r="3"/>
  <circle class="dot" cx="90" cy="300" r="3"/>
  <circle class="dot" cx="150" cy="400" r="3"/>
  <circle class="dot" cx="200" cy="40" r="3"/>
  <circle class="dot" cx="140" cy="120" r="3"/>

  <!-- ── GRADUATION CAP (center-left) ── -->
  <g transform="translate(420, 60)">
    <!-- Board -->
    <polygon class="line" points="80,30 160,60 80,90 0,60" style="stroke:rgba(200,169,81,0.35);stroke-width:1.5"/>
    <!-- Tassel post -->
    <line class="line" x1="80" y1="30" x2="80" y2="5" style="stroke:rgba(200,169,81,0.35)"/>
    <circle class="dot" cx="80" cy="4" r="3" style="fill:rgba(200,169,81,0.4)"/>
    <!-- Tassel drop -->
    <line class="line" x1="80" y1="4" x2="110" y2="4" style="stroke:rgba(200,169,81,0.25)"/>
    <line class="line" x1="110" y1="4" x2="110" y2="40" style="stroke:rgba(200,169,81,0.25)"/>
    <!-- Cap base -->
    <path class="line" d="M40,60 Q40,110 80,110 Q120,110 120,60" style="stroke:rgba(200,169,81,0.25);fill:none"/>
  </g>

  <!-- ── OPEN BOOK (left of center) ── -->
  <g transform="translate(300, 360)">
    <!-- Left page -->
    <path class="line-w" d="M0,0 Q0,-80 60,-80 L60,0 Z" style="stroke:rgba(255,255,255,0.18)"/>
    <!-- Right page -->
    <path class="line-w" d="M60,0 L60,-80 Q120,-80 120,0 Z" style="stroke:rgba(255,255,255,0.18)"/>
    <!-- Spine -->
    <line class="line-w" x1="60" y1="-80" x2="60" y2="0" style="stroke:rgba(255,255,255,0.25)"/>
    <!-- Text lines on pages -->
    <line class="line-w" x1="10" y1="-60" x2="50" y2="-60" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="10" y1="-48" x2="50" y2="-48" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="10" y1="-36" x2="45" y2="-36" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="10" y1="-24" x2="50" y2="-24" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="70" y1="-60" x2="110" y2="-60" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="70" y1="-48" x2="110" y2="-48" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="70" y1="-36" x2="105" y2="-36" style="stroke:rgba(255,255,255,0.10)"/>
    <line class="line-w" x1="70" y1="-24" x2="110" y2="-24" style="stroke:rgba(255,255,255,0.10)"/>
  </g>

  <!-- ── SERVER RACK (right side) ── -->
  <g transform="translate(1100, 40)">
    <!-- Rack frame -->
    <rect class="line" x="0" y="0" width="200" height="420" rx="4" style="stroke:rgba(200,169,81,0.28);stroke-width:1.5"/>
    <!-- Server units -->
    <rect class="line-w" x="10" y="15" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="55" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="95" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="135" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="175" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="215" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="255" width="180" height="30" rx="2" style="stroke:rgba(255,255,255,0.20)"/>
    <rect class="line-w" x="10" y="295" width="180" height="50" rx="2" style="stroke:rgba(255,255,255,0.15)"/>
    <rect class="line-w" x="10" y="355" width="180" height="50" rx="2" style="stroke:rgba(255,255,255,0.15)"/>
    <!-- LED indicators -->
    <circle cx="165" cy="30" r="3" style="fill:rgba(61,158,69,0.6)"/>
    <circle cx="155" cy="30" r="3" style="fill:rgba(61,158,69,0.4)"/>
    <circle cx="165" cy="70" r="3" style="fill:rgba(61,158,69,0.5)"/>
    <circle cx="155" cy="70" r="3" style="fill:rgba(200,169,81,0.5)"/>
    <circle cx="165" cy="110" r="3" style="fill:rgba(61,158,69,0.6)"/>
    <circle cx="165" cy="150" r="3" style="fill:rgba(61,158,69,0.4)"/>
    <circle cx="155" cy="150" r="3" style="fill:rgba(61,158,69,0.6)"/>
    <circle cx="165" cy="190" r="3" style="fill:rgba(200,169,81,0.5)"/>
    <circle cx="165" cy="230" r="3" style="fill:rgba(61,158,69,0.5)"/>
    <circle cx="165" cy="270" r="3" style="fill:rgba(61,158,69,0.6)"/>
    <!-- Drive bays -->
    <rect class="line-w" x="20" y="305" width="30" height="30" rx="2" style="stroke:rgba(255,255,255,0.12)"/>
    <rect class="line-w" x="58" y="305" width="30" height="30" rx="2" style="stroke:rgba(255,255,255,0.12)"/>
    <rect class="line-w" x="96" y="305" width="30" height="30" rx="2" style="stroke:rgba(255,255,255,0.12)"/>
    <rect class="line-w" x="134" y="305" width="30" height="30" rx="2" style="stroke:rgba(255,255,255,0.12)"/>
  </g>

  <!-- ── NETWORK NODES (center area) ── -->
  <g transform="translate(600, 100)">
    <!-- Nodes -->
    <circle class="line" cx="80" cy="80" r="16" style="stroke:rgba(200,169,81,0.40);stroke-width:1.5"/>
    <circle class="line" cx="200" cy="40" r="12" style="stroke:rgba(200,169,81,0.30)"/>
    <circle class="line" cx="320" cy="100" r="16" style="stroke:rgba(200,169,81,0.40);stroke-width:1.5"/>
    <circle class="line" cx="180" cy="180" r="12" style="stroke:rgba(200,169,81,0.30)"/>
    <circle class="line" cx="380" cy="200" r="10" style="stroke:rgba(200,169,81,0.25)"/>
    <circle class="line" cx="60" cy="200" r="10" style="stroke:rgba(200,169,81,0.25)"/>
    <circle class="line" cx="260" cy="260" r="14" style="stroke:rgba(61,158,69,0.35);stroke-width:1.5"/>
    <circle class="line" cx="100" cy="300" r="10" style="stroke:rgba(200,169,81,0.25)"/>
    <circle class="line" cx="420" cy="80" r="8" style="stroke:rgba(200,169,81,0.20)"/>
    <!-- Connection lines -->
    <line class="line-g" x1="80" y1="80" x2="200" y2="40"/>
    <line class="line-g" x1="200" y1="40" x2="320" y2="100"/>
    <line class="line-g" x1="80" y1="80" x2="180" y2="180"/>
    <line class="line-g" x1="320" y1="100" x2="180" y2="180"/>
    <line class="line-g" x1="320" y1="100" x2="380" y2="200"/>
    <line class="line-g" x1="80" y1="80" x2="60" y2="200"/>
    <line class="line-g" x1="60" y1="200" x2="180" y2="180"/>
    <line class="line-g" x1="180" y1="180" x2="260" y2="260"/>
    <line class="line-g" x1="380" y1="200" x2="260" y2="260"/>
    <line class="line-g" x1="260" y1="260" x2="100" y2="300"/>
    <line class="line-g" x1="200" y1="40" x2="420" y2="80"/>
    <line class="line-g" x1="320" y1="100" x2="420" y2="80"/>
    <!-- Inner dots -->
    <circle cx="80" cy="80" r="4" style="fill:rgba(200,169,81,0.5)"/>
    <circle cx="320" cy="100" r="4" style="fill:rgba(200,169,81,0.5)"/>
    <circle cx="260" cy="260" r="4" style="fill:rgba(61,158,69,0.6)"/>
    <circle cx="200" cy="40" r="3" style="fill:rgba(200,169,81,0.4)"/>
    <circle cx="180" cy="180" r="3" style="fill:rgba(200,169,81,0.35)"/>
    <circle cx="60" cy="200" r="3" style="fill:rgba(200,169,81,0.3)"/>
    <circle cx="380" cy="200" r="3" style="fill:rgba(200,169,81,0.3)"/>
  </g>

  <!-- ── PADLOCK / SHIELD (upper right area) ── -->
  <g transform="translate(880, 50)">
    <!-- Shield -->
    <path class="line" d="M60,0 L120,20 L120,80 Q120,130 60,150 Q0,130 0,80 L0,20 Z" 
          style="stroke:rgba(200,169,81,0.35);stroke-width:1.5"/>
    <!-- Shield inner -->
    <path class="line" d="M60,15 L105,30 L105,80 Q105,118 60,132 Q15,118 15,80 L15,30 Z" 
          style="stroke:rgba(200,169,81,0.20)"/>
    <!-- Lock body -->
    <rect class="line" x="38" y="70" width="44" height="35" rx="5" style="stroke:rgba(200,169,81,0.45);stroke-width:1.5"/>
    <!-- Lock arch -->
    <path class="line" d="M46,70 L46,55 Q60,42 74,55 L74,70" style="stroke:rgba(200,169,81,0.45);stroke-width:1.5"/>
    <!-- Keyhole -->
    <circle cx="60" cy="83" r="5" style="fill:rgba(200,169,81,0.30)"/>
    <rect x="57" y="83" width="6" height="10" style="fill:rgba(200,169,81,0.30)"/>
  </g>

  <!-- ── LAPTOP (lower center) ── -->
  <g transform="translate(560, 350)">
    <!-- Screen -->
    <rect class="line-w" x="0" y="0" width="160" height="100" rx="4" style="stroke:rgba(255,255,255,0.22);stroke-width:1.5"/>
    <!-- Code lines on screen -->
    <line class="line-g" x1="12" y1="20" x2="80" y2="20" style="stroke:rgba(61,158,69,0.40)"/>
    <line class="line-w" x1="12" y1="32" x2="110" y2="32" style="stroke:rgba(255,255,255,0.15)"/>
    <line class="line-w" x1="20" y1="44" x2="95" y2="44" style="stroke:rgba(255,255,255,0.12)"/>
    <line class="line-g" x1="20" y1="56" x2="70" y2="56" style="stroke:rgba(61,158,69,0.30)"/>
    <line class="line-w" x1="12" y1="68" x2="100" y2="68" style="stroke:rgba(255,255,255,0.12)"/>
    <line class="line-g" x1="12" y1="80" x2="55" y2="80" style="stroke:rgba(61,158,69,0.25)"/>
    <!-- Cursor blink -->
    <rect x="57" y="76" width="6" height="10" style="fill:rgba(61,158,69,0.40)"/>
    <!-- Base/keyboard -->
    <rect class="line-w" x="-15" y="100" width="190" height="12" rx="3" style="stroke:rgba(255,255,255,0.18);stroke-width:1.5"/>
    <!-- Hinge -->
    <line class="line-w" x1="0" y1="100" x2="160" y2="100" style="stroke:rgba(255,255,255,0.20)"/>
    <!-- Touchpad -->
    <rect class="line-w" x="60" y="105" width="40" height="4" rx="2" style="stroke:rgba(255,255,255,0.12)"/>
  </g>

  <!-- ── BINARY STREAMS (scattered) ── -->
  <text class="text-art" x="740" y="490" style="fill:rgba(61,158,69,0.15)">01001000 01100101 01101100 01101100 01101111 00100000 01010111 01101111 01110010 01101100 01100100</text>
  <text class="text-art" x="0" y="510" style="fill:rgba(200,169,81,0.10)">10110100 11001010 00110101 10101010 11110000 01010101 00001111 11001100</text>
  <text class="text-art" x="1050" y="510" style="fill:rgba(255,255,255,0.08)">01110010 00110000 01101111 01110100</text>

  <!-- ── CIRCUIT TRACES (right side) ── -->
  <polyline class="line" points="1400,100 1340,100 1340,160 1270,160"/>
  <polyline class="line" points="1400,220 1360,220 1360,280 1290,280 1290,240 1200,240"/>
  <polyline class="line" points="1400,360 1350,360 1350,300 1280,300"/>
  <polyline class="line" points="1400,460 1330,460 1330,400 1250,400 1250,440 1180,440"/>
  <!-- Branch ups -->
  <polyline class="line" points="1340,100 1340,60 1270,60 1270,100"/>
  <polyline class="line" points="1360,280 1360,320 1290,320"/>
  <circle class="dot" cx="1340" cy="100" r="4"/>
  <circle class="dot" cx="1270" cy="160" r="4"/>
  <circle class="dot" cx="1290" cy="240" r="4"/>
  <circle class="dot" cx="1200" cy="240" r="3"/>
  <circle class="dot" cx="1280" cy="300" r="4"/>
  <circle class="dot" cx="1250" cy="440" r="3"/>

  <!-- ── MAGNIFYING GLASS (bottom left area) ── -->
  <g transform="translate(130, 380)">
    <circle class="line" cx="50" cy="50" r="38" style="stroke:rgba(255,255,255,0.22);stroke-width:1.5"/>
    <circle class="line" cx="50" cy="50" r="30" style="stroke:rgba(255,255,255,0.12)"/>
    <!-- Handle -->
    <line class="line-w" x1="78" y1="78" x2="105" y2="105" style="stroke:rgba(255,255,255,0.25);stroke-width:3;stroke-linecap:round"/>
    <!-- Code inside lens -->
    <line class="line-g" x1="25" y1="38" x2="68" y2="38" style="stroke:rgba(61,158,69,0.35)"/>
    <line class="line-g" x1="30" y1="50" x2="72" y2="50" style="stroke:rgba(61,158,69,0.25)"/>
    <line class="line-g" x1="25" y1="62" x2="60" y2="62" style="stroke:rgba(61,158,69,0.30)"/>
  </g>

  <!-- ── TOPOGRAPHIC / GRID LINES (subtle background pattern) ── -->
  <!-- Horizontal faint grid -->
  <line x1="0" y1="130" x2="1400" y2="130" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>
  <line x1="0" y1="260" x2="1400" y2="260" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>
  <line x1="0" y1="390" x2="1400" y2="390" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>
  <!-- Vertical faint grid -->
  <line x1="350" y1="0" x2="350" y2="520" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>
  <line x1="700" y1="0" x2="700" y2="520" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>
  <line x1="1050" y1="0" x2="1050" y2="520" style="stroke:rgba(255,255,255,0.025);stroke-width:1"/>

  <!-- ── DIPLOMA SCROLL (upper center-left) ── -->
  <g transform="translate(500, 210)">
    <rect class="line" x="0" y="0" width="110" height="80" rx="3" style="stroke:rgba(200,169,81,0.28);stroke-width:1.5"/>
    <!-- Rolled ends -->
    <ellipse class="line" cx="0" cy="40" rx="8" ry="40" style="stroke:rgba(200,169,81,0.22)"/>
    <ellipse class="line" cx="110" cy="40" rx="8" ry="40" style="stroke:rgba(200,169,81,0.22)"/>
    <!-- Text lines -->
    <line class="line" x1="18" y1="22" x2="92" y2="22" style="stroke:rgba(200,169,81,0.18)"/>
    <line class="line" x1="18" y1="34" x2="92" y2="34" style="stroke:rgba(200,169,81,0.15)"/>
    <line class="line" x1="18" y1="46" x2="80" y2="46" style="stroke:rgba(200,169,81,0.15)"/>
    <!-- Seal -->
    <circle cx="55" cy="62" r="10" style="fill:none;stroke:rgba(200,169,81,0.30);stroke-width:1"/>
    <circle cx="55" cy="62" r="6" style="fill:rgba(200,169,81,0.15)"/>
    <!-- Ribbon -->
    <line class="line" x1="48" y1="72" x2="44" y2="85" style="stroke:rgba(61,158,69,0.25)"/>
    <line class="line" x1="62" y1="72" x2="66" y2="85" style="stroke:rgba(61,158,69,0.25)"/>
  </g>

  <!-- ── STACKED BOOKS (far right, below rack) ── -->
  <g transform="translate(1080, 420)">
    <rect class="line" x="0" y="40" width="120" height="18" rx="2" style="stroke:rgba(200,169,81,0.28)"/>
    <rect class="line" x="5" y="22" width="115" height="18" rx="2" style="stroke:rgba(255,255,255,0.18)"/>
    <rect class="line" x="2" y="4" width="118" height="18" rx="2" style="stroke:rgba(61,158,69,0.22)"/>
    <rect class="line" x="8" y="-14" width="112" height="18" rx="2" style="stroke:rgba(200,169,81,0.22)"/>
  </g>

  <!-- ── FLOWING DATA PATH connecting elements ── -->
  <path class="line-g" d="M280,140 Q400,140 500,210" style="stroke:rgba(61,158,69,0.12)"/>
  <path class="line-g" d="M620,430 Q800,460 1080,440" style="stroke:rgba(61,158,69,0.10)"/>
  <path class="line" d="M700,130 Q900,80 1100,80" style="stroke:rgba(200,169,81,0.10)"/>
</svg>